name: Beta Build

on:
  push:
    branches:
      - develop
      - beta
      - 'beta/*'
  schedule:
    - cron: '0 2 * * 0'  # Weekly at 2 AM UTC
  workflow_dispatch:

env:
  QT_VERSION: 6.5.0
  CMAKE_VERSION: 3.27.0

jobs:
  build-beta:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: nekobox
            asset_name: nekobox-beta-linux-x64
            build_cmd: cmake --build . --config RelWithDebInfo -j$(nproc)
          - os: macos-latest
            artifact_name: nekobox
            asset_name: nekobox-beta-macos-x64
            build_cmd: cmake --build . --config RelWithDebInfo -j$(sysctl -n hw.ncpu)
          - os: windows-latest
            artifact_name: RelWithDebInfo/nekobox.exe
            asset_name: nekobox-beta-windows-x64.exe
            build_cmd: cmake --build . --config RelWithDebInfo -j%NUMBER_OF_PROCESSORS%

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup CMake
        uses: cmake-js/setup-cmake@v3
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Setup Qt (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'desktop'
          modules: 'qtbase qtdeclarative'
          cache: 'true'

      - name: Setup Qt (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'mac'
          target: 'desktop'
          modules: 'qtbase qtdeclarative'
          cache: 'true'

      - name: Setup Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'windows'
          target: 'desktop'
          modules: 'qtbase qtdeclarative'
          cache: 'true'

      - name: Setup build environment (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-dev \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0

      - name: Setup build environment (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Setup build environment (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1

      - name: Create build directory
        run: mkdir -p build_beta

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: build_beta
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DENABLE_TESTING=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: build_beta
        run: |
          cmake .. `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON `
            -DENABLE_TESTING=ON

      - name: Build Beta
        working-directory: build_beta
        run: ${{ matrix.build_cmd }}

      - name: Run tests
        working-directory: build_beta
        continue-on-error: true
        run: |
          if [ -f "CMakeFiles/ctest.cmake" ] || [ "$(ls -A test 2>/dev/null)" ]; then
            ctest --output-on-failure --timeout 120
          else
            echo "No tests found"
          fi
        shell: bash

      - name: Get version
        id: version
        run: |
          if [ -f nekoray_version.txt ]; then
            VERSION=$(head -n 1 nekoray_version.txt | xargs)
            echo "version=${VERSION}-beta-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          else
            echo "version=beta-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create release package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release_package
          cp build_beta/${{ matrix.artifact_name }} release_package/
          cd release_package
          tar -czf ../${{ matrix.asset_name }}-${{ steps.version.outputs.version }}.tar.gz .
          cd ..
          ls -lh *.tar.gz

      - name: Create release package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir release_package
          copy build_beta\${{ matrix.artifact_name }} release_package\
          cd release_package
          tar -a -c -f ../${{ matrix.asset_name }}-${{ steps.version.outputs.version }}.zip .
          cd ..
          dir *.zip

      - name: Generate checksums
        run: |
          python3 -c "
          import hashlib
          import os
          import glob
          
          for f in glob.glob('*.tar.gz') + glob.glob('*.zip'):
              with open(f, 'rb') as file:
                  sha256 = hashlib.sha256(file.read()).hexdigest()
                  with open(f + '.sha256', 'w') as hash_file:
                      hash_file.write(sha256)
                  print(f'{f}: {sha256}')
          "

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-${{ matrix.os }}-${{ github.run_id }}
          path: |
            *.tar.gz
            *.zip
            *.sha256
          retention-days: 60

      - name: Comment on commit
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Beta build completed! Check artifacts for downloads.'
            })

  cleanup-old-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old beta artifacts
        uses: geekyeggo/delete-artifact@v2
        with:
          name: beta-*
          failOnError: false