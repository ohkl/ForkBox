name: Test Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  QT_VERSION: 6.5.0
  CMAKE_VERSION: 3.27.0

jobs:
  test-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: nekobox
            asset_name: nekobox-test-linux-x64
            build_cmd: cmake --build . --config Debug -j$(nproc)
          - os: macos-latest
            artifact_name: nekobox
            asset_name: nekobox-test-macos-x64
            build_cmd: cmake --build . --config Debug -j$(sysctl -n hw.ncpu)
          - os: windows-latest
            artifact_name: Debug/nekobox.exe
            asset_name: nekobox-test-windows-x64.exe
            build_cmd: cmake --build . --config Debug -j%NUMBER_OF_PROCESSORS%

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup CMake
        uses: cmake-js/setup-cmake@v3
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Setup Qt (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'desktop'
          modules: 'qtbase qtdeclarative'
          cache: 'true'

      - name: Setup Qt (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'mac'
          target: 'desktop'
          modules: 'qtbase qtdeclarative'
          cache: 'true'

      - name: Setup Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'windows'
          target: 'desktop'
          modules: 'qtbase qtdeclarative'
          cache: 'true'

      - name: Setup build environment (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-dev \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0

      - name: Setup build environment (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Setup build environment (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1

      - name: Create build directory
        run: mkdir -p build_test

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: build_test
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DENABLE_TESTING=ON \
            -DCMAKE_CXX_FLAGS="-g -O0"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: build_test
        run: |
          cmake .. `
            -DCMAKE_BUILD_TYPE=Debug `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON `
            -DENABLE_TESTING=ON

      - name: Build Test
        working-directory: build_test
        run: ${{ matrix.build_cmd }}

      - name: Run unit tests
        working-directory: build_test
        continue-on-error: true
        timeout-minutes: 30
        run: |
          if [ -f "CMakeFiles/ctest.cmake" ] || [ "$(ls -A test 2>/dev/null)" ]; then
            ctest --output-on-failure --timeout 120 -V
          else
            echo "⚠ No tests found"
          fi
        shell: bash

      - name: Get version and build info
        id: info
        run: |
          if [ -f nekoray_version.txt ]; then
            VERSION=$(head -n 1 nekoray_version.txt | xargs)
            echo "version=${VERSION}-test-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          else
            echo "version=test-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create release package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release_package
          cp build_test/${{ matrix.artifact_name }} release_package/
          cd release_package
          tar -czf ../${{ matrix.asset_name }}-${{ steps.info.outputs.version }}.tar.gz .
          cd ..
          ls -lh *.tar.gz

      - name: Create release package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir release_package
          copy build_test\${{ matrix.artifact_name }} release_package\
          cd release_package
          tar -a -c -f ../${{ matrix.asset_name }}-${{ steps.info.outputs.version }}.zip .
          cd ..
          dir *.zip

      - name: Generate build report
        run: |
          python3 << 'EOF'
          import hashlib
          import os
          import glob
          import json
          from datetime import datetime
          
          report = {
              "build_type": "test",
              "timestamp": "${{ steps.info.outputs.timestamp }}",
              "version": "${{ steps.info.outputs.version }}",
              "os": "${{ matrix.os }}",
              "artifacts": []
          }
          
          for f in glob.glob('*.tar.gz') + glob.glob('*.zip'):
              with open(f, 'rb') as file:
                  sha256 = hashlib.sha256(file.read()).hexdigest()
                  size = os.path.getsize(f)
                  report["artifacts"].append({
                      "name": f,
                      "size": size,
                      "sha256": sha256
                  })
                  with open(f + '.sha256', 'w') as hash_file:
                      hash_file.write(sha256)
          
          with open('build_report.json', 'w') as f:
              json.dump(report, f, indent=2)
          
          print(json.dumps(report, indent=2))
          EOF

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.os }}-${{ github.run_id }}
          path: |
            *.tar.gz
            *.zip
            *.sha256
            build_report.json
          retention-days: 14

      - name: Post build status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const os = '${{ matrix.os }}';
            const success = '${{ job.status }}' === 'success';
            const status = success ? '✅' : '❌';
            const url = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            console.log(`${status} Test build for ${os}: ${success ? 'passed' : 'failed'}`);
            console.log(`Details: ${url}`);

  build-summary:
    needs: test-build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary
        run: |
          echo "# Test Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) | while read f; do
            size=$(du -h "$f" | cut -f1)
            echo "- \`$(basename "$f")\` ($size)" >> $GITHUB_STEP_SUMMARY
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Linux:** ${{ needs.test-build.outputs.linux-status || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **macOS:** ${{ needs.test-build.outputs.macos-status || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Windows:** ${{ needs.test-build.outputs.windows-status || 'N/A' }}" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup old test artifacts
        uses: geekyeggo/delete-artifact@v2
        with:
          name: test-*
          failOnError: false