name: Test Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  QT_VERSION: 6.7.0

jobs:
  test-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: nekobox
            asset_name: nekobox-test-linux-x64
          - os: macos-latest
            artifact_name: nekobox
            asset_name: nekobox-test-macos-x64
          - os: windows-latest
            artifact_name: Debug/nekobox.exe
            asset_name: nekobox-test-windows-x64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup CMake and Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Setup CMake and Ninja (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Setup CMake and Ninja (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install cmake ninja -y

      - name: Setup Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-svg-dev \
            libgl1-mesa-dev \
            libxkbcommon-x11-dev

      - name: Setup Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6

      - name: Setup Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtbase qtsvg'
          cache: true

      - name: Setup additional dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1

      - name: Create build directory
        run: mkdir -p build_test

      - name: Configure CMake
        working-directory: build_test
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DNO_EXTERNAL=1

      - name: Build Test (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: build_test
        run: cmake --build . --config Debug -j$(if [ "$(uname)" = "Darwin" ]; then sysctl -n hw.ncpu; else nproc; fi)

      - name: Build Test (Windows)
        if: runner.os == 'Windows'
        working-directory: build_test
        run: cmake --build . --config Debug -j %NUMBER_OF_PROCESSORS%

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -f nekoray_version.txt ]; then
            VERSION=$(head -n 1 nekoray_version.txt | xargs)
            echo "version=${VERSION}-test-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          else
            echo "version=test-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Create release package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release_package
          cp build_test/${{ matrix.artifact_name }} release_package/ || true
          cd release_package
          tar -czf ../${{ matrix.asset_name }}-${{ steps.version.outputs.version }}.tar.gz .
          cd ..
          ls -lh *.tar.gz

      - name: Create release package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release_package -Force
          Copy-Item "build_test\${{ matrix.artifact_name }}" "release_package\" -ErrorAction SilentlyContinue
          cd release_package
          $file = "${{ matrix.asset_name }}-${{ steps.version.outputs.version }}.zip"
          7z a "..\$file" .
          cd ..
          Get-Item *.zip

      - name: Generate checksums (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for f in *.tar.gz; do
            [ -f "$f" ] && sha256sum "$f" > "$f.sha256"
          done

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem *.zip | ForEach-Object {
            $hash = (Get-FileHash $_ -Algorithm SHA256).Hash
            "$hash" | Out-File "$($_.Name).sha256"
          }

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.os }}-${{ github.run_id }}
          path: |
            *.tar.gz
            *.zip
            *.sha256
          retention-days: 14

  build-summary:
    needs: test-build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate summary
        shell: bash
        run: |
          echo "# Test Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) | while read f; do
            size=$(du -h "$f" | cut -f1)
            echo "- \`$(basename "$f")\` ($size)" >> $GITHUB_STEP_SUMMARY
          done