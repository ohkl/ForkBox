name: Test Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: windows-2022
            arch: x64
            qt_version: "6.7"
          - platform: ubuntu-20.04
            arch: x64
            qt_version: "6.7"
          - platform: macos-latest
            arch: x64
            qt_version: "6.7"
      fail-fast: false

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-2022'
        shell: pwsh
        run: |
          choco install cmake ninja -y

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-20.04'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build \
            qt6-base-dev qt6-declarative-dev \
            libgl1-mesa-dev libxkbcommon-x11-dev \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          brew install cmake ninja qt@6

      - name: Setup Qt (Windows)
        if: matrix.platform == 'windows-2022'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtbase qtdeclarative'
          cache: true

      - name: Setup MSVC (Windows)
        if: matrix.platform == 'windows-2022'
        uses: microsoft/setup-msbuild@v1

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -f nekoray_version.txt ]; then
            VERSION=$(head -n 1 nekoray_version.txt | xargs)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=test-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      - name: Create build directory
        shell: bash
        run: mkdir -p build

      - name: Configure (Windows)
        if: matrix.platform == 'windows-2022'
        working-directory: build
        shell: pwsh
        run: |
          cmake .. `
            -DCMAKE_BUILD_TYPE=Debug `
            -DQT_VERSION_MAJOR=6 `
            -DBUILD_SHARED_LIBS=OFF `
            -DNO_EXTERNAL=1 `
            -DNO_GRPC=1 `
            -DNO_YAML=1 `
            -DNO_ZXING=1 `
            -DNO_QHOTKEY=1

      - name: Configure (Linux/macOS)
        if: matrix.platform != 'windows-2022'
        working-directory: build
        shell: bash
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQT_VERSION_MAJOR=6 \
            -DBUILD_SHARED_LIBS=OFF \
            -DNO_EXTERNAL=1 \
            -DNO_GRPC=1 \
            -DNO_YAML=1 \
            -DNO_ZXING=1 \
            -DNO_QHOTKEY=1

      - name: Build (Windows)
        if: matrix.platform == 'windows-2022'
        working-directory: build
        shell: pwsh
        run: cmake --build . --config Debug -j 4

      - name: Build (Linux/macOS)
        if: matrix.platform != 'windows-2022'
        working-directory: build
        shell: bash
        run: |
          JOBS=$(if [ "$(uname)" = "Darwin" ]; then sysctl -n hw.ncpu; else nproc; fi)
          cmake --build . --config Debug -j $JOBS

      - name: Find executable (Windows)
        if: matrix.platform == 'windows-2022'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "build" -Recurse -Name "nekobox.exe" | Select-Object -First 1
          if ($exe) {
            echo "EXECUTABLE=build\$exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Found: build\$exe"
          } else {
            Write-Host "nekobox.exe not found!"
            Get-ChildItem -Path "build" -Recurse -Include "*.exe" | Select-Object FullName
          }

      - name: Find executable (Linux/macOS)
        if: matrix.platform != 'windows-2022'
        shell: bash
        run: |
          EXE=$(find build -name nekobox -type f -executable 2>/dev/null | head -1)
          if [ -n "$EXE" ]; then
            echo "EXECUTABLE=$EXE" >> $GITHUB_ENV
            echo "Found: $EXE"
          else
            echo "nekobox not found!"
            find build -name nekobox -o -name "*.exe" 2>/dev/null
          fi

      - name: Create artifact directory (Windows)
        if: matrix.platform == 'windows-2022'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "artifacts" -Force | Out-Null
          if ($env:EXECUTABLE) {
            Copy-Item $env:EXECUTABLE "artifacts/nekobox.exe"
            Write-Host "Artifact created: artifacts/nekobox.exe"
          }

      - name: Create artifact directory (Linux/macOS)
        if: matrix.platform != 'windows-2022'
        shell: bash
        run: |
          mkdir -p artifacts
          if [ -n "$EXECUTABLE" ] && [ -f "$EXECUTABLE" ]; then
            cp "$EXECUTABLE" artifacts/nekobox
            echo "Artifact created: artifacts/nekobox"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nekobox-${{ matrix.platform }}-${{ steps.version.outputs.version }}
          path: artifacts/
          retention-days: 30