name: Release Build

on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (optional)'
        required: false
        default: ''

env:
  QT_VERSION: 6.5.0
  CMAKE_VERSION: 3.27.0

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: nekobox
            asset_name: nekobox-linux-x64
            build_cmd: cmake --build . --config Release -j$(nproc)
          - os: macos-latest
            artifact_name: nekobox
            asset_name: nekobox-macos-x64
            build_cmd: cmake --build . --config Release -j$(sysctl -n hw.ncpu)
          - os: windows-latest
            artifact_name: Release/nekobox.exe
            asset_name: nekobox-windows-x64.exe
            build_cmd: cmake --build . --config Release -j%NUMBER_OF_PROCESSORS%

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup CMake
        uses: cmake-js/setup-cmake@v3
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Setup Qt (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'desktop'
          modules: 'qtbase qtdeclarative'
          cache: 'true'

      - name: Setup Qt (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'mac'
          target: 'desktop'
          modules: 'qtbase qtdeclarative'
          cache: 'true'

      - name: Setup Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'windows'
          target: 'desktop'
          modules: 'qtbase qtdeclarative'
          cache: 'true'

      - name: Setup build environment (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-dev \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0

      - name: Setup build environment (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Setup build environment (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1

      - name: Create build directory
        run: mkdir -p build_release

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: build_release
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: build_release
        run: |
          cmake .. `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON

      - name: Build Release
        working-directory: build_release
        run: ${{ matrix.build_cmd }}

      - name: Get version
        id: version
        run: |
          if [ -f nekoray_version.txt ]; then
            VERSION=$(head -n 1 nekoray_version.txt | xargs)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=unknown" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create release package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release_package
          cp build_release/${{ matrix.artifact_name }} release_package/
          cd release_package
          tar -czf ../${{ matrix.asset_name }}-${{ steps.version.outputs.version }}.tar.gz .
          cd ..
          ls -lh *.tar.gz

      - name: Create release package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir release_package
          copy build_release\${{ matrix.artifact_name }} release_package\
          cd release_package
          tar -a -c -f ../${{ matrix.asset_name }}-${{ steps.version.outputs.version }}.zip .
          cd ..
          dir *.zip

      - name: Generate checksums
        run: |
          python3 -c "
          import hashlib
          import os
          import glob
          
          for f in glob.glob('*.tar.gz') + glob.glob('*.zip'):
              with open(f, 'rb') as file:
                  sha256 = hashlib.sha256(file.read()).hexdigest()
                  with open(f + '.sha256', 'w') as hash_file:
                      hash_file.write(sha256)
                  print(f'{f}: {sha256}')
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            *.tar.gz
            *.zip
            *.sha256
          retention-days: 30

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [ -f nekoray_version.txt ]; then
            VERSION=$(head -n 1 nekoray_version.txt | xargs)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Releases
        run: |
          echo "✓ Release created successfully!"
          echo "Files:"
          find artifacts -type f | head -20