name: Release Build

on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:

env:
  QT_VERSION: 6.7.0

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: nekobox
            asset_name: nekobox-linux-x64
          - os: macos-latest
            artifact_name: nekobox
            asset_name: nekobox-macos-x64
          - os: windows-latest
            artifact_name: Release/nekobox.exe
            asset_name: nekobox-windows-x64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup CMake and Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Setup CMake and Ninja (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Setup CMake and Ninja (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install cmake ninja -y

      - name: Setup Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-svg-dev \
            libgl1-mesa-dev \
            libxkbcommon-x11-dev

      - name: Setup Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6

      - name: Setup Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtbase qtsvg'
          cache: true

      - name: Setup additional dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1

      - name: Create build directory
        run: mkdir -p build_release

      - name: Configure CMake
        working-directory: build_release
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DNO_EXTERNAL=1

      - name: Build Release (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: build_release
        run: cmake --build . --config Release -j$(if [ "$(uname)" = "Darwin" ]; then sysctl -n hw.ncpu; else nproc; fi)

      - name: Build Release (Windows)
        if: runner.os == 'Windows'
        working-directory: build_release
        run: cmake --build . --config Release -j %NUMBER_OF_PROCESSORS%

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -f nekoray_version.txt ]; then
            VERSION=$(head -n 1 nekoray_version.txt | xargs)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Create release package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release_package
          cp build_release/${{ matrix.artifact_name }} release_package/ || true
          cd release_package
          tar -czf ../${{ matrix.asset_name }}-${{ steps.version.outputs.version }}.tar.gz .
          cd ..
          ls -lh *.tar.gz

      - name: Create release package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release_package -Force
          Copy-Item "build_release\${{ matrix.artifact_name }}" "release_package\" -ErrorAction SilentlyContinue
          cd release_package
          $file = "${{ matrix.asset_name }}-${{ steps.version.outputs.version }}.zip"
          7z a "..\$file" .
          cd ..
          Get-Item *.zip

      - name: Generate checksums (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for f in *.tar.gz; do
            [ -f "$f" ] && sha256sum "$f" > "$f.sha256"
          done

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem *.zip | ForEach-Object {
            $hash = (Get-FileHash $_ -Algorithm SHA256).Hash
            "$hash" | Out-File "$($_.Name).sha256"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            *.tar.gz
            *.zip
            *.sha256
          retention-days: 30

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -f nekoray_version.txt ]; then
            VERSION=$(head -n 1 nekoray_version.txt | xargs)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-*/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}